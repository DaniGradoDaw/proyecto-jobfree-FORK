stripe.simulacion.activa=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.error.include-message=always
# JWT_SECRET debe estar definido en .env — sin fallback para evitar claves débiles accidentales
jwt.secret=${JWT_SECRET}
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Email SMTP (desarrollo) ────────────────────────────────────────────────────
# Configura MAIL_USERNAME y MAIL_PASSWORD en tu archivo .env local (nunca en este fichero)
# Pasos para obtener una App Password de Gmail:
#  1. Activa la verificación en 2 pasos en tu cuenta Google
#  2. Ve a: Cuenta de Google → Seguridad → Contraseñas de aplicaciones
#  3. Selecciona "Correo" + "Otro (nombre personalizado)" → Genera
#  4. Copia la contraseña de 16 caracteres (sin espacios) y añádela a .env como MAIL_PASSWORD
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
