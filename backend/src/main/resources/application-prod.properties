spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
server.error.include-message=never
cookie.secure=true
# En produccion JWT_SECRET DEBE estar definido en el entorno — sin fallback intencional
jwt.secret=${JWT_SECRET}
spring.flyway.enabled=false

# Crea el esquema en MySQL 9.4 si no existe — idempotente gracias a IF NOT EXISTS
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-prod.sql
spring.sql.init.continue-on-error=true

# Swagger deshabilitado en produccion — expone la API pública innecesariamente
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
